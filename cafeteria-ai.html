<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>食堂AIアシスタント</title>
<style>
  /* ===== Google Fonts ===== */
  @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap');

  /* ===== CSS変数（色・サイズの一元管理） ===== */
  :root {
    --bg: #fdf6ec;
    --panel: #fff8f0;
    --accent: #ff7043;
    --accent2: #ffb74d;
    --accent3: #4caf7d;
    --dark: #2d2d2d;
    --mid: #6b6b6b;
    --light: #e8ddd0;
    --bubble-ai: #fff3e0;
    --bubble-user: #e8f5e9;
    --shadow: 0 4px 24px rgba(0,0,0,0.10);
    --radius: 20px;
    --font-main: 'M PLUS Rounded 1c', 'Noto Sans JP', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-main);
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 100px;
  }

  /* ===== ヘッダー ===== */
  header {
    text-align: center;
    margin-bottom: 20px;
    animation: fadeDown 0.6s ease;
  }
  header h1 {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  header p { font-size: 0.85rem; color: var(--mid); margin-top: 4px; }

  /* ===== アバターエリア ===== */
  .avatar-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 16px;
    animation: fadeDown 0.7s ease;
  }

  /* アバター本体（CSSで描いたキャラクター） */
  .avatar-wrapper {
    position: relative;
    width: 120px;
    height: 150px;
  }

  /* 体 */
  .body {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 70px; height: 70px;
    background: var(--accent);
    border-radius: 20px 20px 10px 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* エプロン */
  .body::after {
    content: '食堂';
    font-size: 0.65rem;
    font-weight: 800;
    color: white;
    background: var(--accent2);
    padding: 3px 6px;
    border-radius: 8px;
    margin-top: 10px;
  }
  /* 腕 */
  .arm-left, .arm-right {
    position: absolute;
    width: 18px; height: 50px;
    background: var(--accent);
    border-radius: 10px;
    bottom: 30px;
  }
  .arm-left  { left: 6px;  transform-origin: top center; transform: rotate(-10deg); }
  .arm-right { right: 6px; transform-origin: top center; transform: rotate(10deg); }

  /* 頭 */
  .head {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 72px; height: 72px;
    background: #ffd5b0;
    border-radius: 50%;
    border: 3px solid #f5ba8c;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  /* 目 */
  .eyes {
    display: flex;
    gap: 12px;
    margin-top: -6px;
  }
  .eye {
    width: 10px; height: 10px;
    background: var(--dark);
    border-radius: 50%;
    transition: transform 0.2s;
  }
  /* 口（通常時） */
  .mouth {
    position: absolute;
    bottom: 16px; left: 50%;
    transform: translateX(-50%);
    width: 22px; height: 10px;
    border-bottom: 3px solid #c0774a;
    border-radius: 0 0 50% 50%;
    transition: all 0.3s;
  }

  /* 話しているときのアニメーション */
  .avatar-wrapper.talking .arm-right {
    animation: waveArm 0.5s infinite alternate;
  }
  .avatar-wrapper.talking .eye {
    animation: blink 0.8s infinite;
  }
  .avatar-wrapper.talking .mouth {
    animation: talk 0.25s infinite alternate;
  }
  /* 帽子 */
  .hat {
    position: absolute;
    top: -12px; left: 50%;
    transform: translateX(-50%);
    width: 60px; height: 24px;
    background: white;
    border: 3px solid var(--light);
    border-radius: 4px;
  }
  .hat::before {
    content: '';
    position: absolute;
    bottom: -3px; left: -8px;
    width: 76px; height: 6px;
    background: var(--light);
    border-radius: 3px;
  }

  /* 吹き出し */
  .speech-bubble {
    background: white;
    border: 2px solid var(--accent2);
    border-radius: 16px;
    padding: 10px 14px;
    font-size: 0.85rem;
    max-width: 260px;
    text-align: center;
    color: var(--dark);
    margin-top: 10px;
    position: relative;
    line-height: 1.5;
    min-height: 44px;
    box-shadow: var(--shadow);
  }
  .speech-bubble::before {
    content: '';
    position: absolute;
    top: -12px; left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-bottom-color: var(--accent2);
  }

  /* ===== チャットログ ===== */
  .chat-log {
    width: 100%; max-width: 480px;
    background: var(--panel);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 16px;
    max-height: 260px;
    overflow-y: auto;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .message {
    display: flex;
    gap: 8px;
    animation: fadeUp 0.3s ease;
  }
  .message.user { flex-direction: row-reverse; }

  .msg-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
  }
  .message.ai   .msg-icon { background: var(--accent);  color: white; }
  .message.user .msg-icon { background: var(--accent3); color: white; }

  .msg-bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 0.88rem;
    line-height: 1.6;
    white-space: pre-wrap;
  }
  .message.ai   .msg-bubble { background: var(--bubble-ai);   border-bottom-left-radius: 4px; }
  .message.user .msg-bubble { background: var(--bubble-user); border-bottom-right-radius: 4px; }

  /* ===== 入力エリア ===== */
  .input-area {
    width: 100%; max-width: 480px;
    background: white;
    border-radius: var(--radius);
    padding: 14px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: fixed;
    bottom: 16px;
    left: 50%; transform: translateX(-50%);
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  #chatInput {
    flex: 1;
    border: 2px solid var(--light);
    border-radius: 12px;
    padding: 10px 14px;
    font-family: var(--font-main);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
    height: 44px;
  }
  #chatInput:focus { border-color: var(--accent2); }

  /* ボタン共通 */
  .btn {
    border: none;
    border-radius: 12px;
    padding: 10px 16px;
    font-family: var(--font-main);
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  .btn:active { transform: scale(0.95); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-send { background: var(--accent);  color: white; padding: 10px 20px; }
  .btn-mic  { background: var(--accent3); color: white; padding: 10px 14px; font-size: 1.1rem; }
  .btn-mic.recording { background: #e53935; animation: pulse 1s infinite; }

  /* ステータス表示 */
  #status {
    font-size: 0.78rem;
    color: var(--mid);
    text-align: center;
    min-height: 18px;
  }

  /* ===== アニメーション定義 ===== */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes waveArm {
    from { transform: rotate(10deg); }
    to   { transform: rotate(35deg); }
  }
  @keyframes blink {
    0%, 90%, 100% { transform: scaleY(1); }
    95%            { transform: scaleY(0.1); }
  }
  @keyframes talk {
    from { height: 10px; }
    to   { height: 5px; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.6; }
  }
  @keyframes dotDot {
    0%   { content: '考え中.'; }
    33%  { content: '考え中..'; }
    66%  { content: '考え中...'; }
    100% { content: '考え中.'; }
  }

  .thinking::after {
    content: '考え中.';
    animation: dotDot 1.2s infinite;
  }
</style>
</head>
<body>

<!-- ===== ヘッダー ===== -->
<header>
  <h1>🍱 食堂AIアシスタント</h1>
  <p>メニューについて何でも聞いてね！</p>
</header>

<!-- ===== アバター ===== -->
<div class="avatar-area">
  <div class="avatar-wrapper" id="avatar">
    <div class="hat"></div>
    <div class="head">
      <div class="eyes">
        <div class="eye"></div>
        <div class="eye"></div>
      </div>
      <div class="mouth"></div>
    </div>
    <div class="arm-left"></div>
    <div class="arm-right"></div>
    <div class="body"></div>
  </div>
  <div class="speech-bubble" id="bubbleText">
    こんにちは！食堂のことなら何でも聞いてね😊
  </div>
</div>

<!-- ===== チャットログ ===== -->
<div class="chat-log" id="chatLog">
  <div class="message ai">
    <div class="msg-icon">🍱</div>
    <div class="msg-bubble">こんにちは！食堂アシスタントです。メニューのこと、アレルギーのこと、何でも聞いてください！</div>
  </div>
</div>

<!-- ===== 入力エリア ===== -->
<div class="input-area">
  <div class="input-row">
    <!-- 🎤 マイクボタン：音声入力の開始/停止 -->
    <button class="btn btn-mic" id="micBtn" title="音声入力">🎤</button>
    <!-- テキスト入力欄 -->
    <textarea id="chatInput" placeholder="例：今日のランチは何ですか？" rows="1"></textarea>
    <!-- 送信ボタン -->
    <button class="btn btn-send" id="sendBtn" onclick="sendMessage()">送信</button>
  </div>
  <div id="status">Enterキーでも送信できます</div>
</div>


<script>
// ============================================================
// 【食堂のメニュー情報】ここを書き換えてカスタマイズしてください
// ============================================================
const MENU_DATA = `
【食堂メニュー情報】

■ ランチセット A（¥650）
  内容：ご飯・味噌汁・唐揚げ2個・サラダ
  使用食材：鶏肉、小麦粉、卵、キャベツ、きゅうり
  アレルギー：卵・小麦・大豆

■ ランチセット B（¥600）
  内容：ご飯・味噌汁・焼き魚・漬物
  使用食材：鮭、米、味噌、大豆
  アレルギー：魚・大豆

■ カレーライス（¥500）
  内容：カレー・ご飯・福神漬け
  使用食材：豚肉、じゃがいも、玉ねぎ、にんじん、小麦粉
  アレルギー：小麦・豚肉

■ うどん（¥450）
  内容：かけうどん・天かす・ねぎ
  使用食材：小麦粉（うどん）、だし（かつお・昆布）
  アレルギー：小麦・魚

■ 日替わり丼（¥550）
  ※本日：親子丼
  使用食材：鶏肉、卵、玉ねぎ、醤油、みりん
  アレルギー：卵・大豆

■ サラダ単品（¥200）
  使用食材：レタス、トマト、きゅうり、コーン
  アレルギー：なし

■ 味噌汁（¥100）
  使用食材：味噌、豆腐、わかめ、大豆
  アレルギー：大豆

営業時間：11:00〜14:00（平日のみ）
`;

// ============================================================
// 【システムプロンプト】AIの性格・役割の設定
// ============================================================
const SYSTEM_PROMPT = `あなたは大学の食堂で働くフレンドリーなAIアシスタントです。
以下のメニュー情報をもとに、学生からの質問に日本語で答えてください。

${MENU_DATA}

回答のルール：
- 丁寧でも親しみやすい口調で話す（「〜だよ！」「〜です！」など）
- アレルギーに関する質問には特に丁寧・正確に答える
- メニュー情報にない質問は「わからない」と正直に答える
- 回答は2〜4文程度に簡潔にまとめる`;

// ============================================================
// 会話履歴（AIとのやりとりを記憶するための配列）
// ============================================================
let conversationHistory = [];

// ============================================================
// OllamaのAPIにメッセージを送って返答をもらう関数
// ============================================================
async function callOllama(userMessage) {
  // 会話履歴にユーザーの発言を追加
  conversationHistory.push({ role: "user", content: userMessage });

  try {
    // OllamaはローカルのAPIサーバーとして動く（port 11434）
    const response = await fetch("http://localhost:11434/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "gemma3",          // 使用するAIモデル名
        messages: [
          { role: "system", content: SYSTEM_PROMPT },  // AIの役割設定
          ...conversationHistory                         // これまでの会話履歴
        ],
        stream: false             // falseにすると全文まとめて返ってくる
      })
    });

    if (!response.ok) throw new Error("Ollamaに接続できませんでした");

    const data = await response.json();
    const aiReply = data.message.content;

    // 会話履歴にAIの返答も追加（次回の会話で文脈として使われる）
    conversationHistory.push({ role: "assistant", content: aiReply });

    return aiReply;

  } catch (error) {
    // エラーの場合はわかりやすいメッセージを返す
    return `⚠️ Ollamaに接続できませんでした。\n` +
           `以下を確認してください：\n` +
           `1. Ollamaがインストールされているか\n` +
           `2. ターミナルで「ollama serve」を実行しているか\n` +
           `3. 「ollama pull gemma3」でモデルを取得しているか`;
  }
}

// ============================================================
// メッセージ送信のメイン処理
// ============================================================
async function sendMessage() {
  const input = document.getElementById("chatInput");
  const text = input.value.trim();
  if (!text) return;  // 空なら何もしない

  input.value = "";   // 入力欄をクリア

  // 【1】ユーザーのメッセージをチャットに表示
  addMessage("user", text);

  // 【2】送信中の状態にする
  setStatus("AIが考え中…");
  document.getElementById("sendBtn").disabled = true;
  setBubble("うーん、考え中だよ…🤔", true);
  setAvatarTalking(false);

  // 【3】OllamaにAIの返答を求める
  const reply = await callOllama(text);

  // 【4】AIの返答をチャットに表示
  addMessage("ai", reply);

  // 【5】吹き出し・アバターに反映
  setBubble(reply.length > 60 ? reply.slice(0, 57) + "…" : reply);
  setAvatarTalking(true);

  // 【6】音声で読み上げる
  speakText(reply);

  // 【7】状態をリセット
  setStatus("Enterキーでも送信できます");
  document.getElementById("sendBtn").disabled = false;
}

// ============================================================
// チャットログにメッセージを追加する
// ============================================================
function addMessage(role, text) {
  const log = document.getElementById("chatLog");
  const div = document.createElement("div");
  div.className = `message ${role}`;
  div.innerHTML = `
    <div class="msg-icon">${role === "ai" ? "🍱" : "👤"}</div>
    <div class="msg-bubble">${escapeHtml(text)}</div>
  `;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;  // 最新メッセージまでスクロール
}

// XSS対策（HTMLタグをエスケープ）
function escapeHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ============================================================
// アバターの吹き出しテキストを変更する
// ============================================================
function setBubble(text, thinking = false) {
  const el = document.getElementById("bubbleText");
  el.textContent = text;
  el.className = thinking ? "speech-bubble thinking" : "speech-bubble";
}

// ============================================================
// アバターの「話しているアニメ」を制御する
// ============================================================
function setAvatarTalking(flag) {
  const avatar = document.getElementById("avatar");
  if (flag) {
    avatar.classList.add("talking");
    setTimeout(() => avatar.classList.remove("talking"), 4000);
  } else {
    avatar.classList.remove("talking");
  }
}

// ============================================================
// ステータステキストを更新する
// ============================================================
function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}

// ============================================================
// 【音声読み上げ】Web Speech API の SpeechSynthesis を使用
// ============================================================
function speakText(text) {
  if (!window.speechSynthesis) return;  // 非対応ブラウザはスキップ

  window.speechSynthesis.cancel();  // 前の読み上げをキャンセル

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "ja-JP";   // 日本語
  utter.rate = 1.1;        // 読み上げ速度（1.0が標準）
  utter.pitch = 1.2;       // 声の高さ（1.0が標準）

  // 読み上げ中はアバターをアニメーション
  utter.onstart = () => setAvatarTalking(true);
  utter.onend   = () => setAvatarTalking(false);

  window.speechSynthesis.speak(utter);
}

// ============================================================
// 【音声入力】Web Speech API の SpeechRecognition を使用
// ============================================================
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isRecording = false;

if (SR) {
  recognition = new SR();
  recognition.lang = "ja-JP";           // 日本語で認識
  recognition.continuous = false;        // 一言話したら止まる
  recognition.interimResults = true;     // 話している途中でもリアルタイムに表示

  // 認識結果をテキスト入力欄に反映
  recognition.onresult = (e) => {
    const transcript = Array.from(e.results)
      .map(r => r[0].transcript)
      .join("");
    document.getElementById("chatInput").value = transcript;
  };

  // 認識が終わったら自動送信
  recognition.onend = () => {
    isRecording = false;
    updateMicBtn();
    const q = document.getElementById("chatInput").value.trim();
    if (q) sendMessage();  // 入力欄に文字があれば送信
  };

  recognition.onerror = (e) => {
    setStatus(`音声認識エラー: ${e.error}`);
    isRecording = false;
    updateMicBtn();
  };
}

// マイクボタンの見た目を更新
function updateMicBtn() {
  const btn = document.getElementById("micBtn");
  if (isRecording) {
    btn.textContent = "⏹";
    btn.classList.add("recording");
    setStatus("🎤 聞き取り中… 話しかけてください");
  } else {
    btn.textContent = "🎤";
    btn.classList.remove("recording");
    setStatus("Enterキーでも送信できます");
  }
}

// マイクボタンを押したときの処理
document.getElementById("micBtn").addEventListener("click", () => {
  if (!recognition) {
    alert("このブラウザは音声認識に対応していません。\nGoogle Chromeをお使いください。");
    return;
  }
  if (isRecording) {
    recognition.stop();
  } else {
    recognition.start();
    isRecording = true;
    updateMicBtn();
  }
});

// Enterキーで送信（Shift+Enterは改行）
document.getElementById("chatInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
</body>
</html>
